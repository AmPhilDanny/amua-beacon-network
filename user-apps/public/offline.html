<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Ogbenjuwa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #06120c;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
    }
    .shield { width: 96px; height: 96px; margin-bottom: 1.5rem; opacity: 0.6; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #22c55e; }
    p { color: #94a3b8; max-width: 320px; line-height: 1.5; margin-bottom: 2rem; }
    .retry-btn {
      background: #22c55e;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #16a34a; }
  </style>
</head>
<body>
  <svg class="shield" viewBox="0 0 512 512" fill="none">
    <rect width="512" height="512" rx="64" fill="#0d1f14"/>
    <path d="M256 76L396 156V316Q396 416 256 476Q116 416 116 316V156Z" fill="none" stroke="#22c55e" stroke-width="16" stroke-linejoin="round"/>
    <path d="M256 116L356 176V304Q356 384 256 436Q156 384 156 304V176Z" fill="none" stroke="#4ade80" stroke-width="8" stroke-linejoin="round"/>
    <circle cx="256" cy="266" r="18" fill="#22c55e" opacity="0.2"/>
    <path d="M248,266 L254,260 L264,272" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>You're Offline</h1>
  <p>Your reports and actions are queued and will be sent automatically when connectivity returns.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data?.type === 'ONLINE') window.location.reload();
      });
    }
  </script>
</body>
</html>
