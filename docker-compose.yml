# ─── Ogbenjuwa Platform — Docker Compose ────────────────────────────────
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ogbenjuwa_central
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./central-command
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ogbenjuwa_central
      REDIS_URL: redis://redis:6379
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-change-me-in-production-too}"
      CORS_ORIGINS: "http://localhost:4000,http://localhost:3000,http://localhost:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  admin:
    build:
      context: ./central-command
      dockerfile: Dockerfile.admin
    ports:
      - "4000:4000"
    depends_on:
      - server
    restart: unless-stopped

  beacon-network:
    build: ./ogbenjuwa-beacon-network
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

  user-apps:
    build: ./user-apps
    ports:
      - "3001:3001"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
